name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Create Android platform
        run: |
          cd frontend
          flutter create --platforms=android --org=com.stocktracker .
      - name: Fix versions
        run: |
          cd frontend/android
          sed -i 's/1.7.1/1.9.22/g' settings.gradle
          sed -i 's/7.3.0/8.1.0/g' settings.gradle
          sed -i 's/7.4.2/8.1.0/g' settings.gradle
          sed -i 's/kotlin_version = .*/kotlin_version = "1.9.22"/g' build.gradle
          sed -i 's/classpath .com.android.tools.build:gradle:.*/classpath "com.android.tools.build:gradle:8.1.0"/g' build.gradle
          sed -i 's/compileSdkVersion .*/compileSdkVersion 34/' app/build.gradle
          sed -i 's/JavaVersion.VERSION_11/JavaVersion.VERSION_17/g' app/build.gradle
          sed -i 's/jvmTarget = .*/jvmTarget = "17"/g' app/build.gradle
          sed -i 's/gradle-7.6.1/gradle-8.3/g' gradle/wrapper/gradle-wrapper.properties
          echo "org.gradle.jvmargs=-Xmx4G" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "kotlin.version=1.9.22" >> gradle.properties
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> local.properties
          rm -f test/widget_test.dart
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('frontend/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-flutter-
      - name: Install deps
        run: cd frontend && flutter pub get
      - name: Tests
        run: cd frontend && flutter test || true
      - name: Build APK
        run: cd frontend && flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: frontend/build/app/outputs/flutter-apk/app-debug.apk

  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - name: Create Android platform
        run: |
          cd frontend
          flutter create --platforms=android --org=com.stocktracker .
          rm -f test/widget_test.dart
      - name: Analyze
        run: |
          cd frontend
          flutter pub get
          flutter analyze