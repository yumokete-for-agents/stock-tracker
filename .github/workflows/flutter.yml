name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Create local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > frontend/android/local.properties
          echo "flutter.sdk=$FLUTTER_ROOT" >> frontend/android/local.properties
          echo "flutter.versionCode=1" >> frontend/android/local.properties
          echo "flutter.versionName=1.0.0" >> frontend/android/local.properties
      - name: Install deps
        run: cd frontend && flutter pub get
      - name: Tests
        run: cd frontend && flutter test || true
      - name: Build APK
        run: cd frontend && flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: frontend/build/app/outputs/flutter-apk/app-debug.apk

  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - name: Analyze
        run: |
          cd frontend
          flutter pub get
          flutter analyze