name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
      - name: Create Android
        run: |
          cd frontend
          flutter create --platforms=android --org=com.stocktracker .
          rm -f test/widget_test.dart
      - name: Fix versions
        run: |
          cd frontend/android
          sed -i "s/id 'org.jetbrains.kotlin.android' version '1.7.1'/id 'org.jetbrains.kotlin.android' version '1.9.22'/g" settings.gradle
          echo "kotlin.version=1.9.22" >> gradle.properties
      - uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-flutter-${{ hashFiles('frontend/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-flutter-
      - name: Install
        run: cd frontend && flutter pub get
      - name: Tests
        run: cd frontend && flutter test || true
      - name: Build
        run: cd frontend && flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: frontend/build/app/outputs/flutter-apk/app-debug.apk

  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
      - name: Create Android
        run: |
          cd frontend
          flutter create --platforms=android --org=com.stocktracker .
          rm -f test/widget_test.dart
      - name: Analyze
        run: |
          cd frontend
          flutter pub get
          flutter analyze